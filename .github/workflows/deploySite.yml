name: Deploy site
# btw this is just copy-pasted from the main site
on:
    push:
        branches: ["main"]
        paths:
            - "**"
            - "!*.md"
            - "*LICENSE*.md"
            - ".**/**"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency: 
    group: "pages"
    cancel-in-progress: false

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on : ubuntu-latest
        steps:
          - name: Checkout the repo
            uses: actions/checkout@v7
          - name: Remove useless files
            run: |    
                rm ./README.md
          - name: Configure site
            uses: actions/configure-pages@v6
          - name: Upload site artifact
            uses: actions/upload-pages-artifact@v5
            with:
                path: "."
          - name: Deploy site
            id: deployment
            uses: actions/deploy-pages@v5